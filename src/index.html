        function gtag() { dataLayer.push(arguments); }

    <script>
        //HEADER START
        document.addEventListener('DOMContentLoaded', function () {
            window.addEventListener('scroll', function () {
                if (window.pageYOffset > 500) {
                    document.querySelector('header').classList.add('header-style');
                } else {
                    document.querySelector('header').classList.remove('header-style');
                }
            });
        });
        //HEADER END
        // TRANSLATE START
        const flagPt = document.querySelector('.flag-pt');
        const flagEn = document.querySelector('.flag-en');
        const descriptionSection = document.querySelector('.description');
        const descriptionPt = `Com vasta experiência na criação de Web-sites e projetos relacionados, já deixei minha marca em diversas empresas. Posso te ajudar? Então entre em contato✌️`;
        const descriptionEn = `With extensive experience in creating Web-sites and related projects, I've already made my mark in various companies. Can I help you? Feel free to get in touch🤟`;
        (function () {
            descriptionSection.innerHTML = descriptionPt
        })();
        flagPt.addEventListener('click', (e) => {
            e.preventDefault()
            descriptionSection.innerHTML = descriptionPt
        })
        flagEn.addEventListener('click', (e) => {
            e.preventDefault()
            descriptionSection.innerHTML = descriptionEn
        })
        // TRANSLATE END
        //RESUME START
        if (document.URL.indexOf('https://natolopes.com.br/index.html#curriculo') >= 0) {
            document.querySelector('resume').innerHTML =
                `
            <section class="resume resume-show" id="curriculo">
                <div>
                    <h2>Currículo (Hard Skills)</h2>
                    <p class="btn btn-primary"><a href="./assets/download/renato-lopes.pdf">renato-lopes.pdf (33KB)</a></p>
                    <p class="btn btn-secondary"><a onclick="closeResume()">Fechar (X)</a></p>
                </div>
            </section>
            `
            document.title = 'Nato·Lopes · Currículo (Hard Skills)';
            document.body.style.overflow = 'hidden';
            document.querySelector('.resume-show').style.opacity = 1;
        }
        function closeResume() {
            const resumeContent = document.querySelector('.resume');
            resumeContent.style.opacity = 0;
            resumeContent.style.visibility = 'hidden';
            resumeContent.classList.remove('resume-show');
            document.body.style.overflow = 'visible';
            document.title = 'Nato·Lopes';
        }
        //RESUME END
    </script>
